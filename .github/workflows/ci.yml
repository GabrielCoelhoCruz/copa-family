name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Impeccable detect (design slop gate)
        run: npm run design:detect

      - name: Production build
        run: npm run build

# E2E Playwright runs locally only: npm run test:e2e (see DEPLOY.md)
